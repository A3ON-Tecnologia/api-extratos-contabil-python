<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação de Processamento | API Extratos</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon-monitor.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tech-navbar.css">
    <link rel="stylesheet" href="/static/css/compact-ui.css">
    <style>
        :root {
            --bg-primary: #0a0f14;
            --bg-secondary: #121527;
            --bg-card: #151a2e;
            --bg-card-hover: #1b2140;
            --accent-primary: #a855f7;
            --accent-secondary: #8b5cf6;
            --accent-test: #a855f7;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(139, 92, 246, 0.25);
            --glow-test: rgba(168, 85, 247, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 15% 10%, rgba(168, 85, 247, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 70% 20%, rgba(99, 102, 241, 0.2) 0%, transparent 45%),
                linear-gradient(transparent 23px, rgba(139, 92, 246, 0.08) 24px),
                linear-gradient(90deg, transparent 23px, rgba(139, 92, 246, 0.08) 24px);
            background-size: auto, auto, 24px 24px, 24px 24px;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .page-wrapper {
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .hero-title {
            font-size: 2.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-test), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-test);
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border: 1px solid rgba(168, 85, 247, 0.5);
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.5rem 0.9rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            border-color: var(--accent-primary);
            color: white;
        }

        .btn.primary {
            border-color: rgba(14, 165, 233, 0.4);
            color: var(--accent-primary);
        }

        .btn.success {
            border-color: rgba(16, 185, 129, 0.4);
            color: var(--accent-success);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 18px 40px rgba(12, 8, 26, 0.5);
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-test);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .file-list {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            overflow: hidden;
            margin: 0 auto 1.5rem;
            box-shadow: 0 18px 40px rgba(12, 8, 26, 0.35);
            max-width: 1000px;
        }

        .file-list-header {
            background: var(--bg-secondary);
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #fileListContainer {
            padding: 1.25rem 1.5rem;
        }

        #fileListContainer > .loading,
        #fileListContainer > .empty-state {
            padding: 2.25rem 0;
        }

        .file-list-header h3 {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .file-list-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.45rem 0.75rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            min-width: 220px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .file-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            flex: 1;
            min-width: 250px;
        }

        .file-name {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .file-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .result-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .result-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-filename {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
        }

        .status-badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-warning);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-error);
        }

        .result-details {
            display: grid;
            gap: 0.75rem;
        }

        .detail-row {
            display: flex;
            gap: 0.5rem;
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            min-width: 150px;
        }

        .detail-value {
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Courier New', monospace;
        }

        .path-display {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-top: 0.5rem;
            overflow-x: auto;
        }

        .path-display code {
            color: var(--accent-primary);
            font-size: 0.85rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem 1rem;
            border-top: 1px solid var(--border-color);
            background: rgba(18, 21, 39, 0.9);
            gap: 1rem;
            flex-wrap: wrap;
        }

        .pagination-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
        }
    </style>
    <link rel="stylesheet" href="/static/css/control-center-theme.css">
</head>

<body>
    <div class="bg-animation"></div>
    <!-- Tech Navbar -->
    {{TECH_NAVBAR}}

    <div class="page-wrapper navbar-collapsed" id="mainContent">
        <div class="container">
            
            
            <div class="hero">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="hero-title">Modo Teste</div>
                    <span class="badge">Monitoramento em tempo real</span>
                </div>
                <div class="controls">
                    <button class="btn" onclick="carregarArquivos()">
                        Atualizar Lista
                    </button>
                    <button class="btn success" onclick="simularTodos()" id="btnSimularTodos" disabled>
                        Simular Todos
                    </button>
                </div>
            </div>

            <div class="stats" id="statsContainer" style="display: none;">
                <div class="stat-card">
                    <div class="stat-icon">T</div>
                    <div>
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">P</div>
                    <div>
                        <div class="stat-label">Processados</div>
                        <div class="stat-value" id="statProcessados">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">OK</div>
                    <div>
                        <div class="stat-label">Identificados</div>
                        <div class="stat-value" style="color: var(--accent-success);" id="statSucesso">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">!</div>
                    <div>
                        <div class="stat-label">Nao Identificados</div>
                        <div class="stat-value" style="color: var(--accent-warning);" id="statNaoIdentificado">0</div>
                    </div>
                </div>
            </div>

</div>

            <div class="file-list">
                <div class="file-list-header">
                    <h3>📁 Arquivos Disponíveis</h3>
                    <div class="file-list-controls">
                        <input class="search-input" id="fileSearch" type="search" placeholder="Buscar arquivo..." />
                        <span id="fileCount">Carregando...</span>
                    </div>
                </div>
                <div id="fileListContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Carregando arquivos da pasta de extratos...</p>
                    </div>
                </div>
                <div class="pagination" id="paginationContainer" style="display: none;">
                    <div class="pagination-info" id="paginationInfo">Mostrando 0 de 0</div>
                    <div class="pagination-controls">
                        <button class="btn" id="btnPrevPage">< Anterior</button>
                        <button class="btn" id="btnNextPage">Proximo ></button>
                    </div>
                </div>
            </div>

            <div id="resultsSection" style="display: none;">
                <div class="result-section">
                    <h3 style="margin-bottom: 1.5rem; color: var(--accent-primary);">📋 Resultados da Simulação</h3>
                    <div id="resultsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let arquivos = [];
        let resultadosSimulacao = [];
        let paginaAtual = 1;
        const itensPorPagina = 10;
        let termoBusca = '';

        async function carregarArquivos() {
            try {
                const response = await fetch('/extratos/mapear');
                const data = await response.json();
                arquivos = data.arquivos;
                paginaAtual = 1;
                atualizarContadorArquivos();
                document.getElementById('btnSimularTodos').disabled = data.total === 0;

                renderizarListaArquivos();
            } catch (error) {
                console.error('Erro ao carregar arquivos:', error);
                document.getElementById('fileListContainer').innerHTML = `
                    <div class="empty-state">
                        <p style="color: var(--accent-error);">Erro ao carregar arquivos: ${error.message}</p>
                    </div>
                `;
            }
        }

        function atualizarContadorArquivos() {
            const total = arquivos.length;
            const filtrados = obterArquivosFiltrados().length;
            const texto = termoBusca ? `${filtrados} de ${total} arquivo(s)` : `${total} arquivo(s)`;
            document.getElementById('fileCount').textContent = texto;
        }

        function obterArquivosFiltrados() {
            if (!termoBusca) {
                return arquivos;
            }
            const termo = termoBusca.toLowerCase();
            return arquivos.filter(arquivo => arquivo.nome.toLowerCase().includes(termo));
        }

        function obterArquivosPaginados(lista) {
            const inicio = (paginaAtual - 1) * itensPorPagina;
            return lista.slice(inicio, inicio + itensPorPagina);
        }
        function renderizarListaArquivos() {
            const container = document.getElementById('fileListContainer');
            const paginationContainer = document.getElementById('paginationContainer');
            const paginationInfo = document.getElementById('paginationInfo');

            const filtrados = obterArquivosFiltrados();
            const totalPaginas = Math.max(1, Math.ceil(filtrados.length / itensPorPagina));
            if (paginaAtual > totalPaginas) {
                paginaAtual = totalPaginas;
            }

            if (filtrados.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path>
                        </svg>
                        <p>${arquivos.length === 0 ? 'Nenhum arquivo PDF/OFX encontrado na pasta de extratos' : 'Nenhum arquivo encontrado para o filtro aplicado'}</p>
                    </div>
                `;
                paginationContainer.style.display = 'none';
                return;
            }

            const pagina = obterArquivosPaginados(filtrados);

            container.innerHTML = pagina.map(arquivo => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${arquivo.nome}</div>
                        <div class="file-meta">${arquivo.tamanho_mb} MB</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn primary" onclick="simularArquivo('${arquivo.nome}')">
                            Simular
                        </button>
                    </div>
                </div>
            `).join('');

            const inicio = (paginaAtual - 1) * itensPorPagina + 1;
            const fim = Math.min(paginaAtual * itensPorPagina, filtrados.length);
            paginationInfo.textContent = `Mostrando ${inicio}-${fim} de ${filtrados.length}`;
            paginationContainer.style.display = totalPaginas > 1 ? 'flex' : 'none';
            document.getElementById('btnPrevPage').disabled = paginaAtual === 1;
            document.getElementById('btnNextPage').disabled = paginaAtual === totalPaginas;
        }

        async function simularArquivo(filename) {
            try {
                const btn = event.target;
                btn.disabled = true;
                btn.textContent = '⏳ Processando...';

                const response = await fetch('/extratos/simular-arquivo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ filename })
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }

                const resultado = await response.json();

                // Adiciona ou atualiza o resultado
                const idx = resultadosSimulacao.findIndex(r => r.arquivo_original === filename);
                if (idx >= 0) {
                    resultadosSimulacao[idx] = resultado;
                } else {
                    resultadosSimulacao.push(resultado);
                }

                renderizarResultados();
                btn.textContent = '✅ Concluído';
                setTimeout(() => {
                    btn.textContent = '🔍 Simular';
                    btn.disabled = false;
                }, 2000);

            } catch (error) {
                console.error('Erro ao simular:', error);
                alert('Erro ao simular arquivo: ' + error.message);
                event.target.disabled = false;
                event.target.textContent = '🔍 Simular';
            }
        }

        async function simularTodos() {
            const btn = document.getElementById('btnSimularTodos');
            btn.disabled = true;
            btn.textContent = '⏳ Processando...';

            try {
                const response = await fetch('/extratos/simular-todos', {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                resultadosSimulacao = data.resultados;

                // Atualiza estatísticas
                document.getElementById('statsContainer').style.display = 'grid';
                document.getElementById('statTotal').textContent = data.total_arquivos;
                document.getElementById('statProcessados').textContent = data.processados;
                document.getElementById('statSucesso').textContent = data.estatisticas.sucesso;
                document.getElementById('statNaoIdentificado').textContent = data.estatisticas.nao_identificado;

                renderizarResultados();
                btn.textContent = '✅ Concluído';

                setTimeout(() => {
                    btn.textContent = '▶️ Simular Todos';
                    btn.disabled = false;
                }, 2000);

            } catch (error) {
                console.error('Erro ao simular todos:', error);
                alert('Erro ao simular arquivos: ' + error.message);
                btn.textContent = '▶️ Simular Todos';
                btn.disabled = false;
            }
        }

        function renderizarResultados() {
            const resultsSection = document.getElementById('resultsSection');
            const resultsContainer = document.getElementById('resultsContainer');

            if (resultadosSimulacao.length === 0) {
                resultsSection.style.display = 'none';
                return;
            }

            resultsSection.style.display = 'block';

            resultsContainer.innerHTML = resultadosSimulacao.map(resultado => {
                const statusClass = resultado.status === 'SUCESSO' ? 'success' :
                                  resultado.status === 'NAO_IDENTIFICADO' ? 'warning' : 'error';
                const statusText = resultado.status === 'SUCESSO' ? '✅ Identificado' :
                                 resultado.status === 'NAO_IDENTIFICADO' ? '⚠️ Não Identificado' : '❌ Erro';

                return `
                    <div class="result-item">
                        <div class="result-header">
                            <div class="result-filename">${resultado.arquivo_original}</div>
                            <div class="status-badge ${statusClass}">${statusText}</div>
                        </div>
                        <div class="result-details">
                            ${resultado.cliente.identificado ? `
                                <div class="detail-row">
                                    <span class="detail-label">Cliente:</span>
                                    <span class="detail-value">${resultado.cliente.nome}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Código:</span>
                                    <span class="detail-value">${resultado.cliente.cod}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Conta:</span>
                                    <span class="detail-value">${resultado.extrato_info.conta || 'N/A'}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Método:</span>
                                    <span class="detail-value">${resultado.cliente.metodo} (Score: ${resultado.cliente.score})</span>
                                </div>
                            ` : ''}
                            <div class="detail-row">
                                <span class="detail-label">Banco:</span>
                                <span class="detail-value">${resultado.extrato_info.banco || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Tipo Documento:</span>
                                <span class="detail-value">${resultado.extrato_info.tipo_documento || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Período:</span>
                                <span class="detail-value">${resultado.periodo.mes}/${resultado.periodo.ano}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Confiança IA:</span>
                                <span class="detail-value">${resultado.extrato_info.confianca}%</span>
                            </div>
                        </div>
                        <div class="path-display">
                            <strong>📂 Caminho de Destino:</strong><br>
                            <code>${resultado.caminho_destino}</code>
                            ${!resultado.pasta_destino_existe ? '<br><span style="color: var(--accent-warning);">⚠️ Pasta de destino não existe</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Carrega arquivos ao iniciar a página
        carregarArquivos();

        document.getElementById('fileSearch').addEventListener('input', (event) => {
            termoBusca = event.target.value.trim();
            paginaAtual = 1;
            atualizarContadorArquivos();
            renderizarListaArquivos();
        });

        document.getElementById('btnPrevPage').addEventListener('click', () => {
            if (paginaAtual > 1) {
                paginaAtual -= 1;
                renderizarListaArquivos();
            }
        });

        document.getElementById('btnNextPage').addEventListener('click', () => {
            const totalPaginas = Math.max(1, Math.ceil(obterArquivosFiltrados().length / itensPorPagina));
            if (paginaAtual < totalPaginas) {
                paginaAtual += 1;
                renderizarListaArquivos();
            }
        });
    </script>
    <script src="/static/js/tech-navbar.js"></script>
</body>

</html>
